          placeholder=\"بريدك الإلكتروني\"\n              className=\"w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-violet-500 transition-colors\"\n            />\n            <button className=\"w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-violet-500/20\">\n              اشترك الآن\n            </button>\n          </form>\n        </div>\n      </div>\n\n      <div className=\"max-w-7xl mx-auto pt-8 border-t border-white/5 flex flex-col md:row items-center justify-between gap-4\">\n        <p className=\"text-zinc-500 text-xs text-center\">\n          &copy; {new Date().getFullYear()} جميع الحقوق محفوظة لمتجر أناقة للتجارة الإلكترونية.\n        </p>\n        <div className=\"flex gap-4 opacity-50 grayscale hover:grayscale-0 transition-all\">\n          <img src=\"https://cdn-icons-png.flaticon.com/512/349/349221.png\" alt=\"Visa\" className=\"h-4\" />\n          <img src=\"https://cdn-icons-png.flaticon.com/512/349/349228.png\" alt=\"Mastercard\" className=\"h-4\" />\n          <img src=\"https://cdn-icons-png.flaticon.com/512/174/174861.png\" alt=\"Paypal\" className=\"h-4\" />\n        </div>\n      </div>\n    </footer>\n  );\n};\n\nexport default Footer;\n","/pages/Home.jsx":"import React, { useEffect, useState } from \"react\";\nimport { Link } from \"react-router-dom\";\nimport { ArrowLeft, Star, TrendingUp, ShieldCheck } from \"lucide-react\";\nimport ProductCard from \"../components/ProductCard\";\n\nconst Home = () => {\n  const [featuredProducts, setFeaturedProducts] = useState([]);\n\n  useEffect(() => {\n    const fetchFeatured = async () => {\n      try {\n        const response = await fetch(\"/api/data/products\");\n        if (response.ok) {\n          const data = await response.json();\n          // عرض أول 4 منتجات كمنتجات مميزة\n          setFeaturedProducts(data.slice(0, 4));\n        }\n      } catch (e) {\n        console.error(e);\n      }\n    };\n    fetchFeatured();\n  }, []);\n\n  return (\n    <div className=\"w-full\">\n      {/* Hero Section */}\n      <section className=\"relative min-h-screen flex items-center justify-center pt-20 overflow-hidden\">\n        <div className=\"absolute inset-0 z-0\">\n          <img\n            src=\"https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=1920&q=80\"\n            alt=\"Hero Fashion\"\n            className=\"w-full h-full object-cover opacity-40\"\n          />\n          <div className=\"absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent\"></div>\n        </div>\n\n        <div className=\"relative z-10 text-center px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto\">\n          <span className=\"inline-block py-1 px-3 rounded-full bg-white/10 border border-white/20 text-white text-sm font-bold tracking-wider mb-6 backdrop-blur-md\">\n            اكتشف أحدث صيحات الموضة\n          </span>\n          <h1 className=\"text-5xl sm:text-7xl lg:text-8xl font-black uppercase tracking-tight mb-8 leading-tight\">\n            تألق بأسلوبك{\" \"}\n            <span className=\"bg-clip-text text-transparent bg-gradient-to-r from-violet-400 via-fuchsia-400 to-pink-400\">\n              الفريد\n            </span>\n          </h1>\n          <p className=\"text-lg sm:text-2xl text-gray-300 mb-10 max-w-3xl mx-auto font-light leading-relaxed\">\n            علامة \"أناقة\" توفر لك أفضل تشكيلات الملابس العصرية للرجال والنساء\n            والأطفال. جودة عالية وتصاميم تواكب أحدث خطوط الموضة العالمية.\n          </p>\n          <div className=\"flex flex-col sm:flex-row gap-4 justify-center items-center\">\n            <Link\n              to=\"/products\"\n              className=\"px-10 py-4 bg-white text-black rounded-full font-bold text-lg hover:scale-105 transition-transform flex items-center gap-2\"\n            >\n              تسوق الآن <ArrowLeft size={20} />\n            </Link>\n            <Link\n              to=\"/about\"\n              className=\"px-10 py-4 bg-zinc-900 border border-white/20 text-white rounded-full font-bold text-lg hover:bg-zinc-800 transition-colors\"\n            >\n              اكتشف قصتنا\n            </Link>\n          </div>\n        </div>\n      </section>\n\n      {/* Featured Categories */}\n      <section className=\"py-20 sm:py-32 bg-zinc-950 px-4 sm:px-6 lg:px-8\">\n        <div className=\"max-w-7xl mx-auto\">\n          <div className=\"text-center mb-16\">\n            <h2 className=\"text-3xl sm:text-5xl font-black mb-4\">\n              تسوق حسب الفئة\n            </h2>\n            <p className=\"text-gray-400 max-w-2xl mx-auto\">\n              اختر من بين تشكيلتنا الواسعة المصنفة لتسهيل تجربة تسوقك.\n            </p>\n          </div>\n          \n          <div className=\"grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-10\">\n            {/* Category 1 */}\n            <div className=\"relative aspect-[3/4] group overflow-hidden rounded-3xl\">\n              <img src=\"https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg\" alt=\"تشكيلة الرجال\" className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-110\" />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8\">\n                <h3 className=\"text-3xl font-bold text-white mb-2\">تشكيلة الرجال</h3>\n                <Link to=\"/products\" className=\"text-violet-400 font-bold flex items-center gap-2 hover:gap-4 transition-all\">\n                  عرض المنتجات <ArrowLeft size={16} />\n                </Link>\n              </div>\n            </div>\n            {/* Category 2 */}\n            <div className=\"relative aspect-[3/4] group overflow-hidden rounded-3xl\">\n              <img src=\"https://images.pexels.com/photos/1926769/pexels-photo-1926769.jpeg\" alt=\"تشكيلة النساء\" className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-110\" />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8\">\n                <h3 className=\"text-3xl font-bold text-white mb-2\">تشكيلة النساء</h3>\n                <Link to=\"/products\" className=\"text-violet-400 font-bold flex items-center gap-2 hover:gap-4 transition-all\">\n                  عرض المنتجات <ArrowLeft size={16} />\n                </Link>\n              </div>\n            </div>\n            {/* Category 3 */}\n            <div className=\"relative aspect-[3/4] group overflow-hidden rounded-3xl\">\n              <img src=\"https://images.pexels.com/photos/1620760/pexels-photo-1620760.jpeg\" alt=\"تشكيلة الأطفال\" className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-110\" />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8\">\n                <h3 className=\"text-3xl font-bold text-white mb-2\">تشكيلة الأطفال</h3>\n                <Link to=\"/products\" className=\"text-violet-400 font-bold flex items-center gap-2 hover:gap-4 transition-all\">\n                  عرض المنتجات <ArrowLeft size={16} />\n                </Link>\n              </div>\n            </div>\n          </div>\n        </div>\n      </section>\n\n      {/* Featured Products */}\n      <section className=\"py-20 sm:py-32 bg-black px-4 sm:px-6 lg:px-8\">\n        <div className=\"max-w-7xl mx-auto\">\n          <div className=\"flex flex-col sm:flex-row justify-between items-end mb-16 gap-6\">\n            <div>\n              <h2 className=\"text-3xl sm:text-5xl font-black mb-4 flex items-center gap-4\">\n                الأكثر مبيعاً <TrendingUp className=\"text-violet-500\" size={40} />\n              </h2>\n              <p className=\"text-gray-400\">القطع المفضلة لدى عملائنا هذا الأسبوع.</p>\n            </div>\n            <Link to=\"/products\" className=\"text-white hover:text-violet-400 font-bold flex items-center gap-2\">\n              عرض الكل <ArrowLeft size={20} />\n            </Link>\n          </div>\n\n          {featuredProducts.length > 0 ? (\n            <div className=\"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6\">\n              {featuredProducts.map((product) => (\n                <ProductCard key={product.id || product._id} product={product} />\n              ))}\n            </div>\n          ) : (\n             <div className=\"text-center py-10 text-gray-500\">جاري تحميل المنتجات...</div>\n          )}\n        </div>\n      </section>\n\n      {/* Trust Badges */}\n      <section className=\"py-16 border-y border-white/10 bg-zinc-950\">\n        <div className=\"max-w-7xl mx-auto px-4 flex flex-wrap justify-around items-center gap-8 text-center\">\n          <div className=\"flex flex-col items-center gap-3\">\n             <ShieldCheck size={40} className=\"text-violet-400\" />\n             <h4 className=\"font-bold text-lg\">جودة مضمونة</h4>\n             <p className=\"text-sm text-gray-400\">ملابس مصنعة من أفضل الخامات</p>\n          </div>\n          <div className=\"flex flex-col items-center gap-3\">\n             <Star size={40} className=\"text-fuchsia-400\" />\n             <h4 className=\"font-bold text-lg\">تقييمات ممتازة</h4>\n             <p className=\"text-sm text-gray-400\">+10,000 عميل سعيد</p>\n          </div>\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Home;\n","/components/AIChat.jsx":"import React, { useState, useEffect, useRef } from 'react';\nimport { Send, Bot, User, X, MessageSquare, Loader2 } from 'lucide-react';\nimport { motion, AnimatePresence } from 'framer-motion';\n\nexport default function AIChat() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [messages, setMessages] = useState([\n    { role: 'assistant', content: 'مرحباً بك في أناقة! أنا مساعدك الذكي، كيف يمكنني مساعدتك اليوم في اختيار ملابسك؟' }\n  ]);\n  const [input, setInput] = useState('');\n  const [loading, setLoading] = useState(false);\n  const scrollRef = useRef(null);\n\n  useEffect(() => {\n    if (scrollRef.current) {\n      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;\n    }\n  }, [messages]);\n\n  const handleSend = async () => {\n    if (!input.trim() || loading) return;\n\n    const userMessage = input.trim();\n    setInput('');\n    setMessages(prev => [...prev, { role: 'user', content: userMessage }]);\n    setLoading(true);\n\n    try {\n      const response = await fetch('/api/proxy/lemondata/v1/chat/completions', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({\n          model: 'gpt-4o-mini',\n          messages: [\n            { role: 'system', content: 'أنت مساعد ذكي لمتجر ملابس دروبشيبينج يسمى \"أناقة\". ساعد المستخدمين في اختيار المقاسات، تنسيق الألوان، واقترح عليهم موديلات عصرية. تحدث بلهجة عربية ودودة واحترافية.' },\n            ...messages,\n            { role: 'user', content: userMessage }\n          ]\n        })\n      });\n\n      const data = await response.json();\n      const aiResponse = data.choices[0].message.content;\n      setMessages(prev => [...prev, { role: 'assistant', content: aiResponse }]);\n    } catch (error) {\n      setMessages(prev => [...prev, { role: 'assistant', content: 'عذراً، واجهت مشكلة في الاتصال. حاول مرة أخرى لاحقاً.' }]);\n    } finally {\n      setLoading(false);\n    }\n  };\n\n  return (\n    <>\n      <button\n        onClick={() => setIsOpen(true)}\n        className=\"fixed bottom-6 right-6 z-50 p-4 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-2xl hover:scale-110 transition-transform\"\n      >\n        <MessageSquare className=\"w-6 h-6\" />\n      </button>\n\n      <AnimatePresence>\n        {isOpen && (\n          <motion.div\n            initial={{ opacity: 0, y: 100, scale: 0.9 }}\n            animate={{ opacity: 1, y: 0, scale: 1 }}\n            exit={{ opacity: 0, y: 100, scale: 0.9 }}\n            className=\"fixed bottom-24 right-6 z-50 w-full max-w-[350px] sm:max-w-md h-[550px] bg-zinc-950 border border-white/10 rounded-3xl shadow-2xl flex flex-col overflow-hidden\"\n          >\n            {/* Header */}\n            <div className=\"p-4 bg-zinc-900 border-b border-white/10 flex items-center justify-between\">\n              <div className=\"flex items-center gap-3\">\n                <div className=\"w-10 h-10 rounded-full bg-violet-600/20 flex items-center justify-center\">\n                  <Bot className=\"w-5 h-5 text-violet-400\" />\n                </div>\n                <div>\n                  <h3 className=\"text-sm font-bold text-white\">مساعد أناقة الذكي</h3>\n                  <p className=\"text-[10px] text-emerald-400\">متصل الآن</p>\n                </div>\n              </div>\n              <button \n                onClick={() => setIsOpen(false)}\n                className=\"p-2 hover:bg-white/5 rounded-xl transition-colors\"\n              >\n                <X className=\"w-5 h-5 text-zinc-400\" />\n              </button>\n            </div>\n\n            {/* Messages */}\n            <div \n              ref={scrollRef}\n              className=\"flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide\"\n            >\n              {messages.map((msg, idx) => (\n                <div \n                  key={idx}\n                  className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}\n                >\n                  <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${\n                    msg.role === 'user' \n                      ? 'bg-violet-600 text-white rounded-tr-none' \n                      : 'bg-zinc-800 text-zinc-200 rounded-tl-none'\n                  }`}>\n                    {msg.content}\n                  </div>\n                </div>\n              ))}\n              {loading && (\n                <div className=\"flex justify-start\">\n                  <div className=\"bg-zinc-800 p-3 rounded-2xl rounded-tl-none\">\n                    <Loader2 className=\"w-4 h-4 text-violet-400 animate-spin\" />\n                  </div>\n                </div>\n              )}\n            </div>\n\n            {/* Input */}\n            <div className=\"p-4 bg-zinc-900 border-t border-white/10\">\n              <div className=\"relative\">\n                <input\n                  type=\"text\"\n                  value={input}\n                  onChange={(e) => setInput(e.target.value)}\n                  onKeyPress={(e) => e.key === 'Enter' && handleSend()}\n                  placeholder=\"اسألني أي شيء عن الموضة...\"\n                  className=\"w-full bg-zinc-800 border-none rounded-2xl py-3 px-4 pr-12 text-sm text-white focus:ring-2 focus:ring-violet-500 transition-all placeholder:text-zinc-500\"\n                />\n                <button\n                  onClick={handleSend}\n                  disabled={loading || !input.trim()}\n                  className=\"absolute left-2 top-1.5 p-1.5 rounded-xl bg-violet-600 text-white hover:bg-violet-700 disabled:opacity-50 disabled:hover:bg-violet-600 transition-colors\"\n                >\n                  <Send className=\"w-4 h-4 rtl:rotate-180\" />\n                </button>\n              </div>\n            </div>\n          </motion.div>\n        )}\n      </AnimatePresence>\n    </>\n  );\n}\n","/components/ProductCard.jsx":"import React from \"react\";\nimport { Link } from \"react-router-dom\";\n\nconst ProductCard = ({ product }) => {\n  // للتعامل مع المنتجات القادمة من الباك إند أو الـ Mock المبكر\n  const pId = product.id || product._id;\n  const pTitle = product.title || product.name;\n  const pPrice = product.price;\n  const pCat = product.category;\n  const pImg = product.image_url || product.image;\n\n  return (\n    <div className=\"group rounded-3xl border border-white/10 bg-white/[0.02] backdrop-blur-xl overflow-hidden hover:border-violet-500/50 transition-colors flex flex-col h-full\">\n      <div className=\"relative aspect-[4/5] overflow-hidden bg-zinc-900\">\n        <img\n          src={pImg}\n          alt={pTitle}\n          className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-105\"\n        />\n        <div className=\"absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-xs text-white border border-white/10\">\n          {pCat}\n        </div>\n      </div>\n      <div className=\"p-6 flex flex-col flex-grow\">\n        <h3 className=\"text-xl font-bold text-white mb-2 line-clamp-1\">\n          {pTitle}\n        </h3>\n        <p className=\"text-gray-400 text-sm mb-4 line-clamp-2\">\n          {product.description || \"وصف المنتج يظهر هنا بشكل مفصل.\"}\n        </p>\n        <div className=\"mt-auto flex items-center justify-between\">\n          <span className=\"text-2xl font-black text-white\">\n            {typeof pPrice === \"number\" ? `$${pPrice}` : pPrice}\n          </span>\n          <Link\n            to={`/product/${pId}`}\n            className=\"bg-white text-black px-4 py-2 rounded-full font-bold hover:bg-violet-500 hover:text-white transition-colors\"\n          >\n            التفاصيل\n          </Link>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default ProductCard;\n","/pages/Products.jsx":"import React, { useState, useEffect } from 'react';\nimport { Search, Filter, ShoppingBag, Loader2 } from 'lucide-react';\nimport ProductCard from '../components/ProductCard';\nimport { motion } from 'framer-motion';\n\nexport default function Products() {\n  const [products, setProducts] = useState([]);\n  const [loading, setLoading] = useState(true);\n  const [search, setSearch] = useState('');\n  const [filter, setFilter] = useState('all');\n\n  useEffect(() => {\n    const fetchProducts = async () => {\n      try {\n        const response = await fetch('/api/data/products');\n        const data = await response.json();\n        setProducts(data);\n      } catch (e) {\n        console.error(e);\n      } finally {\n        setLoading(false);\n      }\n    };\n    fetchProducts();\n  }, []);\n\n  const filteredProducts = products.filter(p => {\n    const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase());\n    const matchesCategory = filter === 'all' || p.category === filter;\n    return matchesSearch && matchesCategory;\n  });\n\n  return (\n    <div className=\"min-h-screen pt-24 pb-16 px-4 sm:px-8\">\n      {/* Header */}\n      <div className=\"max-w-7xl mx-auto mb-16 space-y-8\">\n        <header>\n          <motion.h1 \n            initial={{ opacity: 0, x: -20 }}\n            animate={{ opacity: 1, x: 0 }}\n            className=\"text-4xl sm:text-6xl font-black mb-4 tracking-tight\"\n          >\n            استعرض <span className=\"bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-500\">مجموعتنا</span>\n          </motion.h1>\n          <p className=\"text-zinc-400 max-w-2xl text-lg\">\n            كل قطعة نختارها بعناية لتناسب ذوقك الرفيع. ابحث عن النمط الذي يمثلك في مجموعتنا المتنوعة والمحدثة باستمرار.\n          </p>\n        </header>\n\n        {/* Controls */}\n        <div className=\"flex flex-col md:flex-row gap-4 items-center justify-between\">\n          <div className=\"relative w-full md:max-w-md\">\n            <Search className=\"absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500\" />\n            <input\n              type=\"text\"\n              placeholder=\"ابحث عن موديل، لون، أو مقاس...\"\n              value={search}\n              onChange={(e) => setSearch(e.target.value)}\n              className=\"w-full bg-zinc-900 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:ring-2 focus:ring-violet-500 outline-none transition-all\"\n            />\n          </div>\n\n          <div className=\"flex gap-2 overflow-x-auto w-full md:w-auto pb-2 no-scrollbar\">\n            {['all', 'men', 'women', 'kids'].map((cat) => (\n              <button\n                key={cat}\n                onClick={() => setFilter(cat)}\n                className={`px-6 py-3 rounded-full text-sm font-bold whitespace-nowrap transition-all ${\n                  filter === cat \n                    ? 'bg-violet-600 text-white' \n                    : 'bg-zinc-900 text-zinc-400 border border-white/5 hover:border-white/20'\n                }`}\n              >\n                {cat === 'all' ? 'الكل' : cat === 'men' ? 'رجال' : cat === 'women' ? 'نساء' : 'أطفال'}\n              </button>\n            ))}\n          </div>\n        </div>\n      </div>\n\n      {/* Grid */}\n      <div className=\"max-w-7xl mx-auto\">\n        {loading ? (\n          <div className=\"flex flex-col items-center justify-center py-32 space-y-4\">\n            <Loader2 className=\"w-12 h-12 text-violet-500 animate-spin\" />\n            <p className=\"text-zinc-500\">جاري اختيار أجمل القطع لك...</p>\n          </div>\n        ) : filteredProducts.length > 0 ? (\n          <div className=\"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8\">\n            {filteredProducts.map((product, i) => (\n              <motion.div\n                key={product.id || i}\n                initial={{ opacity: 0, y: 20 }}\n                animate={{ opacity: 1, y: 0 }}\n                transition={{ delay: i * 0.1 }}\n              >\n                <ProductCard product={product} />\n              </motion.div>\n            ))}\n          </div>\n        ) : (\n          <div className=\"text-center py-32 border border-dashed border-white/10 rounded-3xl\">\n            <ShoppingBag className=\"w-16 h-16 text-zinc-700 mx-auto mb-4\" />\n            <h3 className=\"text-xl font-bold text-zinc-300\">لم نجد ما تبحث عنه</h3>\n            <p className=\"text-zinc-500 mt-2\">جرب تعديل كلمات البحث أو الفلاتر</p>\n          </div>\n        )}\n      </div>\n\n      {/* SEO Content Section */}\n      <div className=\"max-w-4xl mx-auto mt-32 space-y-12\">\n        <section className=\"space-y-6\">\n          <h2 className=\"text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-500\">لماذا تختار ملابس \"أناقة\"؟</h2>\n          <div className=\"grid grid-cols-1 md:grid-cols-2 gap-8 text-zinc-400 leading-relaxed\">\n            <p>\n              نحن نؤمن في متجر \"أناقة\" أن الملابس ليست مجرد أقمشة نرتديها، بل هي وسيلة للتعبير عن الذات والثقة. لذلك، نقوم بالتعاون مع أفضل المصنعين حول العالم لنوفر لك قطعاً تجمع بين جودة الخامات وأحدث صيحات الموضة العالمية. سواء كنت تبحث عن إطلالة رسمية للعمل، أو ملابس مريحة ليوم كاجوال، فإن تشكيلتنا تغطي كافة احتياجاتك.\n            </p>\n            <p>\n              نتميز بنظام دروبشيبينج متطور يضمن لك وصول المنتجات بأمان وسرعة. نهتم بأدق التفاصيل من أول خيط في القماش وحتى تغليف المنتج ووصوله إلى باب منزلك. استكشف مجموعتنا اليوم واستمتع بتجربة تسوق لا مثيل لها مع توفير دليل مقاسات دقيق يقلل من احتمالية الخطأ في الاختيار.\n            </p>\n          </div>\n        </section>\n\n        <section className=\"bg-zinc-900/50 p-8 rounded-3xl border border-white/5 space-y-6\">\n          <h3 className=\"text-2xl font-bold text-white\">نصائح لتسوق الموضة عبر الإنترنت</h3>\n          <ul className=\"space-y-4 text-zinc-400\">\n            <li className=\"flex gap-4\">\n              <span className=\"text-violet-500 font-black\">01</span>\n              <span>تأكد دائماً من مراجعة **دليل المقاسات** الخاص بكل منتج، فالمقاسات قد تختلف بين الماركات العالمية والمحلية.</span>\n            </li>\n            <li className=\"flex gap-4\">\n              <span className=\"text-violet-500 font-black\">02</span>\n              <span>اقرأ تفاصيل الخامة بعناية؛ إذا كنت تبحث عن الراحة ابحث عن القطن، وإذا كنت تبحث عن الأناقة في الشتاء فالصوف والجلد هما الخيار الأمثل.</span>\n            </li>\n            <li className=\"flex gap-4\">\n              <span className=\"text-violet-500 font-black\">03</span>\n              <span>تابع مجموعاتنا الموسمية باستمرار، فنحن نوفر تخفيضات هائلة عند تغيير المواسم تصل إلى 50%.</span>\n            </li>\n          </ul>\n        </section>\n      </div>\n    </div>\n  );\n}\n","/pages/ProductDetail.jsx":"import React, { useState } from 'react';\nimport { useParams, Link } from 'react-router-dom';\nimport { ShoppingCart, Star, Heart, Share2, Check, Truck, ShieldCheck, RefreshCw } from 'lucide-react';\n\nconst ProductDetail = () => {\n    const { id } = useParams();\n    const [selectedSize, setSelectedSize] = useState(\"\");\n    const [selectedColor, setSelectedColor] = useState(\"\");\n    const [quantity, setQuantity] = useState(1);\n    const [activeImage, setActiveImage] = useState(0);\n\n    // Simulated Product Data\n    const product = {\n        id: id,\n        name: \"طقم جاكيت شتوي فاخر - صوف إيطالي\",\n        price: 2450,\n        oldPrice: 3200,\n        description: \"تمتع بأناقة لا مثيل لها مع هذا الجاكيت المصنوع من أجود أنواع الصوف الإيطالي. يتميز بتصميم عصري 'Oversize' يوفر الراحة والتدفئة في آن واحد. البطانة الداخلية من الساتان الفاخر تضمن لك ملمساً ناعماً على الجلد لسهولة التحرك.\",\n        features: [\n            \"خامات مضادة للرياح والماء الخفيف\",\n            \"خياطة يدوية دقيقة للمتانة والقوة\",\n            \"تصميم عصري يناسب المناسبات الرسمية والكاجوال\",\n            \"جيوب داخلية إضافية لحفظ المقتنيات الثمينة\"\n        ],\n        sizes: [\"S\", \"M\", \"L\", \"XL\", \"XXL\"],\n        colors: [\"أسود ملكي\", \"رمادي فحمي\", \"أزرق ليلي\"],\n        rating: 4.8,\n        reviewsCount: 124,\n        images: [\n            \"https://images.pexels.com/photos/1183266/pexels-photo-1183266.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1\",\n            \"https://images.pexels.com/photos/16170/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1\",\n            \"https://images.pexels.com/photos/842811/pexels-photo-842811.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1\"\n        ]\n    };\n\n    const handleAddToCart = () => {\n        if(!selectedSize) {\n            alert(\"الرجاء اختيار المقاس أولاً\");\n            return;\n        }\n        alert(\"تمت إضافة المنتج إلى السلة بنجاح!\");\n    };\n\n    return (\n        <div className=\"bg-black text-white min-h-screen pt-28 pb-16\">\n            <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8\">\n                {/* Breadcrumbs */}\n                <nav className=\"flex mb-8 text-sm text-zinc-500\">\n                    <Link to=\"/\" className=\"hover:text-white\">الرئيسية</Link>\n                    <span className=\"mx-2\">/</span>\n                    <Link to=\"/products\" className=\"hover:text-white\">المنتجات</Link>\n                    <span className=\"mx-2\">/</span>\n                    <span className=\"text-zinc-300\">تفاصيل المنتج</span>\n                </nav>\n\n                <div className=\"grid grid-cols-1 lg:grid-cols-2 gap-12\">\n                    {/* Left: Image Gallery */}\n                    <div className=\"space-y-4\">\n                        <div className=\"aspect-[3/4] overflow-hidden rounded-3xl border border-white/10 bg-zinc-900 group\">\n                            <img \n                                src={product.images[activeImage]} \n                                alt={product.name}\n                                className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-110\"\n                            />\n                        </div>\n                        <div className=\"grid grid-cols-3 gap-4\">\n                            {product.images.map((img, index) => (\n                                <button \n                                    key={index}\n                                    onClick={() => setActiveImage(index)}\n                                    className={`aspect-square rounded-2xl overflow-hidden border-2 transition-all ${\n                                        activeImage === index ? 'border-purple-500' : 'border-transparent hover:border-white/20'\n                                    }`}\n                                >\n                                    <img src={img} className=\"w-full h-full object-cover\" alt=\"\" />\n                                </button>\n                            ))}\n                        </div>\n                    </div>\n\n                    {/* Right: Product Info */}\n                    <div className=\"flex flex-col space-y-8\">\n                        <div>\n                            <span className=\"bg-purple-500/10 text-purple-400 border border-purple-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider\">\n                                تشكيلة الشتاء الجديدة\n                            </span>\n                            <h1 className=\"text-4xl sm:text-5xl font-black mt-4 mb-2 leading-tight\">\n                                {product.name}\n                            </h1>\n                            <div className=\"flex items-center gap-4 text-sm mt-3\">\n                                <div className=\"flex text-amber-400\">\n                                    {[...Array(5)].map((_, i) => (\n                                        <Star key={i} className={`w-4 h-4 ${i < Math.floor(product.rating) ? 'fill-current' : ''}`} />\n                                    ))}\n                                </div>\n                                <span className=\"text-zinc-400\">({product.reviewsCount} تقييم حقيقي)</span>\n                            </div>\n                        </div>\n\n                        <div className=\"flex items-baseline gap-4\">\n                            <span className=\"text-4xl font-black text-white\">{product.price.toLocaleString()} ج.م</span>\n                            <span className=\"text-xl text-zinc-500 line-through\">{product.oldPrice.toLocaleString()} ج.م</span>\n                            <span className=\"bg-emerald-500/10 text-emerald-400 text-xs font-bold px-2 py-1 rounded\">خصم 25%</span>\n                        </div>\n\n                        <p className=\"text-zinc-400 text-lg leading-relaxed border-r-4 border-purple-500 pr-4\">\n                            {product.description}\n                        </p>\n\n                        {/* Size Selection */}\n                        <div>\n                            <div className=\"flex justify-between items-center mb-4\">\n                                <h3 className=\"font-bold\">اختر المقاس:</h3>\n                                <Link to=\"/size-guide\" className=\"text-sm text-purple-400 underline underline-offset-4\">دليل المقاسات</Link>\n                            </div>\n                            <div className=\"grid grid-cols-5 gap-3\">\n                                {product.sizes.map(size => (\n                                    <button \n                                        key={size}\n                                        onClick={() => setSelectedSize(size)}\n                                        className={`py-3 rounded-xl font-bold transition-all border ${\n                                            selectedSize === size \n                                            ? 'bg-white text-black border-white' \n                                            : 'border-white/10 hover:border-white/40'\n                                        }`}\n                                    >\n                                        {size}\n                                    </button>\n                                ))}\n                            </div>\n                        </div>\n\n                        {/* Quantity & CTA */}\n                        <div className=\"flex gap-4 items-center\">\n                            <div className=\"flex items-center bg-zinc-900 border border-white/10 rounded-2xl p-1\">\n                                <button \n                                    disabled={quantity <= 1}\n                                    onClick={() => setQuantity(q => q - 1)}\n                                    className=\"w-10 h-10 flex items-center justify-center hover:bg-white/5 rounded-xl disabled:opacity-30\"\n                                >-</button>\n                                <span className=\"w-12 text-center font-bold\">{quantity}</span>\n                                <button \n                                    onClick={() => setQuantity(q => q + 1)}\n                                    className=\"w-10 h-10 flex items-center justify-center hover:bg-white/5 rounded-xl\"\n                                >+</button>\n                            </div>\n                            <button \n                                onClick={handleAddToCart}\n                                className=\"flex-1 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-purple-500/20 transform transition active:scale-95 flex items-center justify-center gap-3\"\n                            >\n                                <ShoppingCart className=\"w-6 h-6\" /> إضافة للسلة\n                            </button>\n                            <button className=\"w-14 h-14 flex items-center justify-center rounded-2xl border border-white/10 hover:bg-white/5 transition-all\">\n                                <Heart className=\"w-6 h-6\" />\n                            </button>\n                        </div>\n\n                        {/* Trust Badges */}\n                        <div className=\"grid grid-cols-3 gap-2 pt-8 border-t border-white/10\">\n                            <div className=\"text-center p-3 rounded-2xl bg-white/[0.02]\">\n                                <Truck className=\"w-6 h-6 mx-auto mb-2 text-purple-400\" />\n                                <span className=\"text-[10px] sm:text-xs\">توصيل سريع</span>\n                            </div>\n                            <div className=\"text-center p-3 rounded-2xl bg-white/[0.02]\">\n                                <ShieldCheck className=\"w-6 h-6 mx-auto mb-2 text-purple-400\" />\n                                <span className=\"text-[10px] sm:text-xs\">ضمان الأصالة</span>\n                            </div>\n                            <div className=\"text-center p-3 rounded-2xl bg-white/[0.02]\">\n                                <RefreshCw className=\"w-6 h-6 mx-auto mb-2 text-purple-400\" />\n                                <span className=\"text-[10px] sm:text-xs\">استبدال 14 يوم</span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n\n                {/* Technical Specs Tab (Full Content) */}\n                <div className=\"mt-24 space-y-12\">\n                    <section className=\"bg-zinc-950 p-8 sm:p-12 rounded-[40px] border border-white/5\">\n                        <h2 className=\"text-3xl font-black mb-8\">لماذا تختار هذا المنتج؟</h2>\n                        <div className=\"grid grid-cols-1 md:grid-cols-2 gap-10\">\n                            {product.features.map((feature, i) => (\n                                <div key={i} className=\"flex gap-4 items-start\">\n                                    <div className=\"mt-1 bg-purple-500/20 p-1 rounded-lg\">\n                                        <Check className=\"text-purple-400 w-5 h-5\" />\n                                    </div>\n                                    <div>\n                                        <h4 className=\"font-bold text-lg mb-1\">الميزة الـ {i + 1}</h4>\n                                        <p className=\"text-zinc-500\">{feature}</p>\n                                    </div>\n                                </div>\n                            ))}\n                        </div>\n                    </section>\n                </div>\n            </div>\n        </div>\n    );\n};\n\nexport default ProductDetail;\n","/pages/About.jsx":"import React from 'react';\nimport { Target, Shield, Users, Globe, Award, Sparkles } from 'lucide-react';\n\nconst About = () => {\n    return (\n        <div className=\"bg-black text-white min-h-screen pt-24\">\n            {/* Hero Section */}\n            <section className=\"relative py-20 overflow-hidden\">\n                <div className=\"absolute top-0 right-0 w-[500px] h-[500px] bg-purple-600/10 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2\"></div>\n                <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center\">\n                    <h1 className=\"text-5xl md:text-8xl font-black mb-6 tracking-tighter uppercase italic\">\n                        قصة <span className=\"bg-gradient-to-r from-violet-500 to-fuchsia-500 bg-clip-text text-transparent\">أناقــة</span>\n                    </h1>\n                    <p className=\"text-xl md:text-2xl text-zinc-400 max-w-3xl mx-auto leading-relaxed\">\n                        نحن لا نبيع الملابس فحسب، بل نصمم الهوية. انطلقنا من شغف عميق بالموضة لنضع بين يديك أجمل التصاميم العالمية بجودة لا تُضاهى.\n                    </p>\n                </div>\n            </section>\n\n            {/* Statistics */}\n            <section className=\"py-20 bg-zinc-950 border-y border-white/5\">\n                <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8\">\n                    <div className=\"grid grid-cols-2 lg:grid-cols-4 gap-8\">\n                        {[\n                            { label: \"عميل سعيد\", value: \"50K+\" },\n                            { label: \"قطعة مباعة\", value: \"120K+\" },\n                            { label: \"مصمم عالمي\", value: \"15+\" },\n                            { label: \"دولة نشحن لها\", value: \"30+\" }\n                        ].map((stat, i) => (\n                            <div key={i} className=\"text-center group p-6 transition-all hover:bg-white/[0.02] rounded-3xl\">\n                                <div className=\"text-4xl sm:text-6xl font-black text-white mb-2 transition-transform group-hover:scale-110\">{stat.value}</div>\n                                <div className=\"text-zinc-500 uppercase tracking-widest text-sm font-bold\">{stat.label}</div>\n                            </div>\n                        ))}\n                    </div>\n                </div>\n            </section>\n\n            {/* Vision & Mission */}\n            <section className=\"py-32\">\n                <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8\">\n                    <div className=\"grid grid-cols-1 md:grid-cols-2 gap-16 items-center\">\n                        <div>\n                            <img \n                                src=\"https://images.pexels.com/photos/3735641/pexels-photo-3735641.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1\" \n                                alt=\"ورشة عمل\" \n                                className=\"rounded-[40px] shadow-2xl border border-white/10\"\n                            />\n                        </div>\n                        <div className=\"space-y-10\">\n                            <div className=\"space-y-4\">\n                                <div className=\"flex items-center gap-3 text-purple-400 font-bold uppercase tracking-widest text-sm\">\n                                    <Target className=\"w-5 h-5\" /> رؤيتنا\n                                </div>\n                                <h2 className=\"text-4xl font-black\">نسعى لتكون \"أناقة\" الوجهة الأولى لرواد الموضة.</h2>\n                                <p className=\"text-zinc-400 text-lg leading-relaxed\">\n                                    نهدف إلى كسر الحواجز التقليدية في تجارة التجزئة عبر توفير قطع فنية تعبر عن شخصية مرتديها، مع الالتزام الكامل بمعايير الاستدامة البيئية في كافة مراحل التصنيع والشحن.\n                                </p>\n                            </div>\n                            <div className=\"space-y-4\">\n                                <div className=\"flex items-center gap-3 text-pink-400 font-bold uppercase tracking-widest text-sm\">\n                                    <Shield className=\"w-5 h-5\" /> قيمنا\n                                </div>\n                                <h2 className=\"text-4xl font-black\">الجودة والشفافية هي أساس عملنا.</h2>\n                                <p className=\"text-zinc-400 text-lg leading-relaxed\">\n                                    نحن نؤمن بأن الثقة هي أغلى ما نملك. لذلك، نعمل بشفافية مطلقة حول مصادر خاماتنا وعمليات الإنتاج، ونبذل قصارى جهدنا لضمان وصول المنتج إليكم بأفضل صورة ممكنة.\n                                </p>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            </section>\n\n            {/* Why Us? */}\n            <section className=\"py-32 bg-zinc-950\">\n                <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8\">\n                    <div className=\"text-center mb-20\">\n                        <h2 className=\"text-4xl md:text-5xl font-black mb-6\">لماذا يختارنا الآلاف؟</h2>\n                        <div className=\"h-1.5 w-24 bg-gradient-to-r from-purple-500 to-pink-500 mx-auto rounded-full\"></div>\n                    </div>\n                    <div className=\"grid grid-cols-1 md:grid-cols-3 gap-8\">\n                        {[\n                            { title: \"تصاميم حصرية\", desc: \"قطعنا ليست موجودة في أي مكان آخر، حيث يعمل فريقنا مع مصممين مستقلين من حول العالم.\", icon: <Sparkles /> },\n                            { title: \"خامات متميزة\", desc: \"نستخدم أفضل أنواع القطن العضوي والأقمشة المعاد تدويرها لنجمع بين الفخامة والمسؤولية.\", icon: <Award /> },\n                            { title: \"خدمة ما بعد البيع\", desc: \"فريق دعمنا متاح على مدار الساعة للإجابة على استفساراتكم وضمان رضاءكم التام.\", icon: <Users /> }\n                        ].map((item, i) => (\n                            <div key={i} className=\"p-10 rounded-[40px] border border-white/5 bg-black hover:border-purple-500/30 transition-all group\">\n                                <div className=\"w-16 h-16 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400 mb-8 group-hover:scale-110 transition-transform\">\n                                    {React.cloneElement(item.icon, { size: 32 })}\n                                </div>\n                                <h3 className=\"text-2xl font-bold mb-4\">{item.title}</h3>\n                                <p className=\"text-zinc-500 leading-relaxed font-medium\">{item.desc}</p>\n                            </div>\n                        ))}\n                    </div>\n                </div>\n            </section>\n        </div>\n    );\n};\n\nexport default About;\n","/pages/SizeGuide.jsx":"import React from 'react';\nimport { Ruler, Info, AlertTriangle } from 'lucide-react';\n\nconst SizeGuide = () => {\n    return (\n        <div className=\"bg-black text-white min-h-screen pt-24 pb-20\">\n            <div className=\"max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-16\">\n                <div className=\"text-center mb-16\">\n                    <Ruler className=\"w-16 h-16 text-purple-500 mx-auto mb-6\" />\n                    <h1 className=\"text-5xl font-black mb-4 uppercase italic\">دليل المقاسات</h1>\n                    <p className=\"text-zinc-400 text-lg\">احصل على المقاس المثالي لك من المرة الأولى لتجنب عناء الإرجاع.</p>\n                </div>\n\n                <div className=\"space-y-16\">\n                    {/* Measurement Tips */}\n                    <div className=\"bg-zinc-950 p-8 rounded-[40px] border border-white/10\">\n                        <h2 className=\"text-2xl font-bold mb-8 flex items-center gap-3 text-purple-400\">\n                            <Info className=\"w-6 h-6\" /> كيف تأخذ قياساتك؟\n                        </h2>\n                        <div className=\"grid grid-cols-1 md:grid-cols-3 gap-8\">\n                            <div>\n                                <h4 className=\"font-bold mb-2\">1. الصدر</h4>\n                                <p className=\"text-sm text-zinc-500\">قم بقياس محيط الصدر من أعرض منطقة، مع إبقاء شريط القياس أفقياً ومريحاً.</p>\n                            </div>\n                            <div>\n                                <h4 className=\"font-bold mb-2\">2. الخصر</h4>\n                                <p className=\"text-sm text-zinc-500\">قم بقياس محيط الخصر من أضيق منطقة (عادة فوق السرة مباشرة).</p>\n                            </div>\n                            <div>\n                                <h4 className=\"font-bold mb-2\">3. الأرداف</h4>\n                                <p className=\"text-sm text-zinc-500\">قف مع ضم قدميك ببعضهما وقم بقياس محيط الأرداف من أعرض منطقة.</p>\n                            </div>\n                        </div>\n                    </div>\n\n                    {/* Size Tables */}\n                    <div className=\"space-y-8\">\n                        <h2 className=\"text-3xl font-black\">جدول مقاسات الملابس العلوية</h2>\n                        <div className=\"overflow-x-auto rounded-3xl border border-white/5\">\n                            <table className=\"w-full text-right bg-zinc-900/40\">\n                                <thead>\n                                    <tr className=\"bg-white/5 border-b border-white/10\">\n                                        <th className=\"px-6 py-4 font-black\">المقاس</th>\n                                        <th className=\"px-6 py-4 font-black text-zinc-400\">الصدر (سم)</th>\n                                        <th className=\"px-6 py-4 font-black text-zinc-400\">الخصر (سم)</th>\n                                        <th className=\"px-6 py-4 font-black text-zinc-400\">الأكتاف (سم)</th>\n                                    </tr>\n                                </thead>\n                                <tbody className=\"divide-y divide-white/5\">\n                                    {[\n                                        { s: \"Small\", b: \"86-91\", w: \"71-76\", sh: \"43\" },\n                                        { s: \"Medium\", b: \"96-101\", w: \"81-86\", sh: \"45\" },\n                                        { s: \"Large\", b: \"106-111\", w: \"91-97\", sh: \"47\" },\n                                        { s: \"X-Large\", b: \"116-121\", w: \"102-107\", sh: \"49\" },\n                                        { s: \"XX-Large\", b: \"127-132\", w: \"112-117\", sh: \"51\" },\n                                    ].map((row, i) => (\n                                        <tr key={i} className=\"hover:bg-purple-500/5 transition-colors\">\n                                            <td className=\"px-6 py-5 font-bold text-white\">{row.s}</td>\n                                            <td className=\"px-6 py-5 text-zinc-400\">{row.b}</td>\n                                            <td className=\"px-6 py-5 text-zinc-400\">{row.w}</td>\n                                            <td className=\"px-6 py-5 text-zinc-400\">{row.sh}</td>\n                                        </tr>\n                                    ))}\n                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n\n                    {/* Note */}\n                    <div className=\"p-6 bg-amber-500/10 border border-amber-500/20 rounded-2xl flex gap-4\">\n                        <AlertTriangle className=\"text-amber-500 w-6 h-6 shrink-0\" />\n                        <p className=\"text-sm text-amber-200/80 leading-relaxed\">\n                            <strong>ملاحظة هامة:</strong> القياسات الموضحة أعلاه هي قياسات الجسم وليست قياسات الملابس. قد تختلف المقاسات بنسبة بسيطة (1-2 سم) بناءً على نوع القماش وستايل الموديل (Oversize أو Slim Fit).\n                        </p>\n                    </div>\n                </div>\n            </div>\n        </div>\n    );\n};\n\nexport default SizeGuide;\n","/App.jsx":"import React, { useEffect } from 'react';\nimport { BrowserRouter, Routes, Route } from 'react-router-dom';\nimport Navbar from './components/Navbar';\nimport Footer from './components/Footer';\nimport AIChat from './components/AIChat';\nimport Home from './pages/Home';\nimport Products from './pages/Products';\nimport ProductDetail from './pages/ProductDetail';\nimport About from './pages/About';\nimport Contact from './pages/Contact';\nimport SizeGuide from './pages/SizeGuide';\nimport Legal from './pages/Legal';\nimport Login from './pages/Login';\nimport Signup from './pages/Signup';\nimport Profile from './pages/Profile';\nimport { useAuthStore } from './stores/authStore';\nimport { seedProducts } from './lib/seed';\n\nexport default function App() {\n  const initializeAuth = useAuthStore(state => state.initialize);\n\n  useEffect(() => {\n    initializeAuth();\n    seedProducts();\n  }, []);\n\n  return (\n    <BrowserRouter>\n      <div className=\"min-h-screen bg-black text-white font-['Cairo'] selection:bg-violet-500/30\">\n        <Navbar />\n        <main>\n          <Routes>\n            <Route path=\"/\" element={<Home />} />\n            <Route path=\"/products\" element={<Products />} />\n            <Route path=\"/product/:id\" element={<ProductDetail />} />\n            <Route path=\"/about\" element={<About />} />\n            <Route path=\"/contact\" element={<Contact />} />\n            <Route path=\"/size-guide\" element={<SizeGuide />} />\n            <Route path=\"/legal\" element={<Legal />} />\n            <Route path=\"/login\" element={<Login />} />\n            <Route path=\"/signup\" element={<Signup />} />\n            <Route path=\"/profile\" element={<Profile />} />\n            <Route path=\"*\" element={\n              <div className=\"min-h-screen flex flex-col items-center justify-center text-center p-4\">\n                <h1 className=\"text-8xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-pink-500 underline underline-offset-8\">404</h1>\n                <p className=\"text-xl text-zinc-400 max-w-md mx-auto mb-8\">عذراً، الصفحة التي تبحث عنها غير موجودة في خزائننا. ربما تم استبدال الموديل!</p>\n                <a href=\"/\" className=\"px-8 py-3 bg-white text-black font-bold rounded-full hover:scale-105 transition-transform\">العودة للرئيسية</a>\n              </div>\n            } />\n          </Routes>\n        </main>\n        <Footer />\n        <AIChat />\n      </div>\n    </BrowserRouter>\n  );\n}\n","/pages/Legal.jsx":"import React from 'react';\n\nconst LegalLayout = ({ title, children }) => (\n  <div className=\"min-h-screen bg-black text-white pt-32 pb-20 px-4 sm:px-6 lg:px-8\">\n    <div className=\"max-w-4xl mx-auto\">\n      <h1 className=\"text-4xl md:text-6xl font-black mb-12 bg-gradient-to-r from-violet-400 to-fuchsia-500 bg-clip-text text-transparent uppercase tracking-tighter\">\n        {title}\n      </h1>\n      <div className=\"prose prose-invert prose-lg max-w-none text-zinc-400 leading-relaxed space-y-8\">\n        {children}\n      </div>\n    </div>\n  </div>\n);\n\nexport const PrivacyPolicy = () => (\n  <LegalLayout title=\"Privacy Policy\">\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">1. Information We Collect</h2>\n      <p>\n        At ANAQA, we collect personal information that you provide to us, such as your name, shipping address, \n        email address, and payment information when you make a purchase. We also collect device information \n        using cookies to improve your browsing experience.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">2. How We Use Your Data</h2>\n      <p>\n        Your data is used solely to process your orders, communicate with you regarding your purchase, \n        and provide you with personalized marketing updates if you have opted in. Your information is \n        processed through secure third-party gateways and is never sold to third parties.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">3. Data Security</h2>\n      <p>\n        We implement industry-standard security measures to protect your personal data. All payment \n        transactions are encrypted using SSL technology to ensure maximum safety.\n      </p>\n    </section>\n  </LegalLayout>\n);\n\nexport const TermsOfService = () => (\n  <LegalLayout title=\"Terms of Service\">\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">1. Acceptance of Terms</h2>\n      <p>\n        By accessing and using the ANAQA store, you agree to comply with and be bound by the following terms \n        and conditions. We reserve the right to update these terms at any time without prior notice.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">2. Product Accuracy</h2>\n      <p>\n        While we strive for 100% accuracy, we cannot guarantee that product descriptions, colors, or prices \n        are entirely error-free. In the event of an error, we reserve the right to cancel orders and \n        issue a full refund.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">3. User Conduct</h2>\n      <p>\n        Illegal use of the site or any attempt to compromise its security is strictly prohibited and will \n        result in immediate termination of access and possible legal action.\n      </p>\n    </section>\n  </LegalLayout>\n);\n\nexport const RefundPolicy = () => (\n  <LegalLayout title=\"Refund Policy\">\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">1. 30-Day Returns</h2>\n      <p>\n        We offer a 30-day return policy for all unworn and unwashed clothing items in their original \n        packaging with tags attached.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">2. Refund Process</h2>\n      <p>\n        Once we receive and inspect your returned item, we will notify you of the approval or rejection \n        of your refund. If approved, the refund will be processed to your original payment method \n        within 5-10 business days.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">3. Return Shipping</h2>\n      <p>\n        Customers are responsible for paying their own shipping costs for returning items. Shipping \n        costs are non-refundable.\n      </p>\n    </section>\n  </LegalLayout>\n);\n\nexport const ShippingPolicy = () => (\n  <LegalLayout title=\"Shipping Policy\">\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">1. Shipping Destinations</h2>\n      <p>\n        ANAQA ships globally. We partner with the best logistics providers to ensure your fashion \n        pieces arrive safely, wherever you are.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">2. Processing & Delivery Times</h2>\n      <p>\n        Orders are typically processed within 2-4 business days. Due to the high demand for our \n        unique pieces and our international logistics model, delivery typically takes 7-15 \n        business days depending on your location.\n      </p>\n    </section>\n    <section>\n      <h2 className=\"text-2xl font-bold text-white mb-4\">3. Tracking Your Order</h2>\n      <p>\n        Once your order has shipped, you will receive an email with a tracking number so you can \n        follow your package every step of the way.\n      </p>\n    </section>\n  </LegalLayout>\n);\n","/pages/Signup.jsx":"import React, { useState } from 'react';\nimport { Link, useNavigate } from 'react-router-dom';\nimport { Mail, Lock, User, Loader2, ArrowRight } from 'lucide-react';\n\nconst Signup = () => {\n    const [name, setName] = useState('');\n    const [email, setEmail] = useState('');\n    const [password, setPassword] = useState('');\n    const [error, setError] = useState('');\n    const [loading, setLoading] = useState(false);\n    const navigate = useNavigate();\n\n    const handleSignup = async (e) => {\n        e.preventDefault();\n        setError('');\n        setLoading(true);\n\n        try {\n            if (!window.__SUPABASE__) {\n                throw new Error(\"لم يتم تكوين قاعدة البيانات (Supabase). يرجى ربط الخدمة من 'اتصالات'.\");\n            }\n\n            if(password.length < 6) {\n                 throw new Error(\"كلمة المرور يجب أن تكون 6 أحرف على الأقل.\");\n            }\n\n            // Register user via Supabase\n            const { data, error: signUpError } = await window.__SUPABASE__.auth.signUp({\n                email,\n                password,\n                options: {\n                    data: { full_name: name }\n                }\n            });\n\n            if (signUpError) throw signUpError;\n            \n            // If email confirmation is required, Supabase handles it. Otherwise user is logged in.\n            navigate('/profile');\n        } catch (err) {\n            setError(err.message || 'حدث خطأ أثناء إنشاء الحساب');\n        } finally {\n            setLoading(false);\n        }\n    };\n\n    return (\n        <div className=\"min-h-screen bg-black pt-28 pb-20 px-4 flex items-center justify-center\">\n            <div className=\"max-w-md w-full bg-zinc-950 p-8 rounded-3xl border border-white/10 shadow-2xl\">\n                <Link to=\"/\" className=\"inline-flex items-center text-gray-400 hover:text-white mb-6 transition-colors\">\n                    <ArrowRight size={20} className=\"ml-2\" /> العودة للرئيسية\n                </Link>\n                \n                <h2 className=\"text-3xl font-black text-white mb-2\">إنشاء حساب جديد</h2>\n                <p className=\"text-gray-400 mb-8\">انضم إلينا وابدأ تجربة تسوق فريدة.</p>\n\n                {error && (\n                    <div className=\"bg-red-500/10 border border-red-500/50 text-red-500 p-4 rounded-xl mb-6 text-sm\">\n                        {error}\n                    </div>\n                )}\n\n                <form onSubmit={handleSignup} className=\"space-y-6\">\n                    <div>\n                        <label className=\"block text-sm font-bold text-gray-300 mb-2\">الاسم الكامل</label>\n                        <div className=\"relative\">\n                            <User className=\"absolute right-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n                            <input \n                                type=\"text\" \n                                required\n                                value={name}\n                                onChange={(e) => setName(e.target.value)}\n                                className=\"w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pr-12 pl-4 text-white focus:border-violet-500 outline-none transition-colors\"\n                                placeholder=\"الاسم\"\n                            />\n                        </div>\n                    </div>\n\n                    <div>\n                        <label className=\"block text-sm font-bold text-gray-300 mb-2\">البريد الإلكتروني</label>\n                        <div className=\"relative\">\n                            <Mail className=\"absolute right-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n                            <input \n                                type=\"email\" \n                                required\n                                value={email}\n                                onChange={(e) => setEmail(e.target.value)}\n                                className=\"w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pr-12 pl-4 text-white focus:border-violet-500 outline-none transition-colors\"\n                                placeholder=\"name@example.com\"\n                                dir=\"ltr\"\n                            />\n                        </div>\n                    </div>\n\n                    <div>\n                        <label className=\"block text-sm font-bold text-gray-300 mb-2\">كلمة المرور</label>\n                        <div className=\"relative\">\n                            <Lock className=\"absolute right-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n                            <input \n                                type=\"password\" \n                                required\n                                value={password}\n                                onChange={(e) => setPassword(e.target.value)}\n                                className=\"w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pr-12 pl-4 text-white focus:border-violet-500 outline-none transition-colors\"\n                                placeholder=\"••••••••\"\n                                dir=\"ltr\"\n                            />\n                        </div>\n                    </div>\n\n                    <button \n                        type=\"submit\" \n                        disabled={loading}\n                        className=\"w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-bold py-4 rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50 flex justify-center items-center gap-2\"\n                    >\n                        {loading ? <Loader2 className=\"animate-spin\" size={20} /> : 'إنشاء حساب'}\n                    </button>\n                </form>\n\n                <p className=\"mt-8 text-center text-gray-400\">\n                    لديك حساب بالفعل؟{' '}\n                    <Link to=\"/login\" className=\"text-vi rder border-white/10 rounded-xl py-3 pr-12 pl-4 text-white focus:border-violet-500 outline-none transition-colors\"\n                                placeholder=\"••••••••\"\n                                dir=\"ltr\"\n                            />\n                        </div>\n                    </div>\n\n                    <button \n                        type=\"submit\" \n                        disabled={loading}\n                        className=\"w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-bold py-4 rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50 flex justify-center items-center gap-2\"\n                    >\n                        {loading ? <Loader2 className=\"animate-spin\" size={20} /> : 'دخول'}\n                    </button>\n                </form>\n\n                <p className=\"mt-8 text-center text-gray-400\">\n                    ليس لديك حساب؟{' '}\n                    <Link to=\"/signup\" className=\"text-violet-400 hover:text-violet-300 font-bold\">\n                        إنشاء حساب جديد\n                    </Link>\n                </p>\n            </div>\n        </div>\n    );\n};\n\nexport default Login;\n","/pages/Profile.jsx":"import React from 'react';\nimport useAuthStore from '../stores/authStore';\nimport { User, Mail, Package, MapPin, Calendar, Clock } from 'lucide-react';\n\nconst Profile = () => {\n    const { user, signOut } = useAuthStore();\n\n    if (!user) return null; // يتم التعامل معها في ProtectedRoute\n\n    return (\n        <div className=\"min-h-screen bg-black pt-28 pb-20 px-4 sm:px-6 lg:px-8\">\n            <div className=\"max-w-5xl mx-auto\">\n                <div className=\"flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6\">\n                    <div>\n                        <h1 className=\"text-4xl sm:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-violet-400 via-fuchsia-400 to-pink-400\">\n               </Link>\n                            </div>\n                        </div>\n\n                        {/* Addresses/Settings */}\n                        <div className=\"bg-zinc-950 border border-white/10 rounded-3xl p-8\">\n                             <h3 className=\"text-2xl font-bold mb-6 flex items-center gap-3\">\n                                 <Clock className=\"text-sky-500\" /> نشاط الحساب\n                             </h3>\n                             <p className=\"text-gray-400\">آخر تسجيل دخول تم بنجاح من هذا الجهاز.</p>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    );\n};\n\n// We handle Link import inside the component\nimport { Link } from 'react-router-dom';\n\nexport default Profile;\n","/stores/authStore.js":"import { create } from \"zustand\";\n\nconst useAuthStore = create((set) => {\n  // Check default session from window.__SUPABASE__\n  let initUser = null;\n  if (window.__SUPABASE__) {\n    // Sync blocking fetch or rely on listener\n    window.__SUPABASE__.auth.getSession().then(({ data }) => {\n      if (data?.session?.user) {\n        set({ user: data.session.user, isAuthenticated: true, isLoading: false });\n      } else {\n        set({ isLoading: false });\n      }\n    });\n  }\n\n  return {\n    user: initUser,\n    isAuthenticated: !!initUser,\n    isLoading: true, // initial state while checking session\n    setUser: (user) => set({ user, isAuthenticated: !!user, isLoading: false }),\n    signOut: async () => {\n      if (window.__SUPABASE__) {\n        await window.__SUPABASE__.auth.signOut();\n      }\n      set({ user: null, isAuthenticated: false });\n    },\n  };\n});\n\n// Setup listener\nif (window.__SUPABASE__) {\n  window.__SUPABASE__.auth.onAuthStateChange((event, session) => {\n    if (session?.user) {\n      useAuthStore.getState().setUser(session.user);\n    } else {\n      useAuthStore.getState().setUser(null);\n    }\n  });\n}\n\nexport default useAuthStore;\n"};
  const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;
    }
    return null;
  }

  function resolvePath(from, spec) {
    // External (bare) — handled via importmap
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    const base = from.replace(/[^/]+$/, '');
    const raw = spec.startsWith('/') ? spec : (base + spec);
    const segs = [];
    for (const s of raw.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return tryResolve('/' + segs.join('/'));
  }

  const NO_DEFAULT_EXTERNALS = new Set([
    'react-dom/client', 'react-router-dom', 'lucide-react', 'framer-motion',
    'recharts', 'date-fns', 'zustand', 'nanoid',
  ]);

  function noDefaultExternalImportPlugin(babel) {
    const t = babel.types;
    return { visitor: {
      ImportDeclaration(path) {
        const source = path.node.source.value;
        if (!NO_DEFAULT_EXTERNALS.has(source)) return;
        const defaultSpecs = path.node.specifiers.filter((s) =>
          t.isImportDefaultSpecifier(s) || (t.isImportSpecifier(s) && s.imported && s.imported.name === 'default')
        );
        if (!defaultSpecs.length) return;
        const rest = path.node.specifiers.filter((s) => !defaultSpecs.includes(s));
        const namespaceImports = defaultSpecs.map((s) =>
          t.importDeclaration([t.importNamespaceSpecifier(t.identifier(s.local.name))], t.stringLiteral(source))
        );
        if (rest.length) {
          path.node.specifiers = rest;
          path.insertBefore(namespaceImports);
        } else {
          path.replaceWithMultiple(namespaceImports);
        }
      },
      ExportNamedDeclaration(path) {
        const source = path.node.source && path.node.source.value;
        if (!source || !NO_DEFAULT_EXTERNALS.has(source)) return;
        const defaultSpecs = path.node.specifiers.filter((s) => s.local && s.local.name === 'default');
        if (!defaultSpecs.length) return;
        const rest = path.node.specifiers.filter((s) => !defaultSpecs.includes(s));
        const replacements = [];
        for (const spec of defaultSpecs) {
          const uid = path.scope.generateUidIdentifierBasedOnNode(spec.exported);
          replacements.push(t.importDeclaration([t.importNamespaceSpecifier(uid)], t.stringLiteral(source)));
          replacements.push(t.exportNamedDeclaration(null, [t.exportSpecifier(uid, spec.exported)]));
        }
        if (rest.length) replacements.push(t.exportNamedDeclaration(null, rest, t.stringLiteral(source)));
        path.replaceWithMultiple(replacements);
      },
    }};
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    return Babel.transform(code, {
      presets, plugins: [noDefaultExternalImportPlugin], filename: path, sourceType: 'module',
    }).code;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  // Pull named bindings out of an import/export-from prefix like 'import Foo, { a, b as c } from '
  function extractNamedBindings(prefix) {
    const out = [];
    const braceMatch = prefix && prefix.match(/\{([^}]*)\}/);
    if (braceMatch) {
      for (const part of braceMatch[1].split(',')) {
        const seg = part.trim();
        if (!seg) continue;
        const name = seg.split(/\s+as\s+/i)[0].trim();
        if (name && name !== 'default' && /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name)) out.push(name);
      }
    }
    return out;
  }

  // Track which named bindings each local module must expose so we can
  // backfill missing ones from the default export instead of crashing.
  const requiredExports = Object.create(null);
  function noteRequired(modulePath, names) {
    if (!names.length) return;
    if (!requiredExports[modulePath]) requiredExports[modulePath] = new Set();
    for (const n of names) requiredExports[modulePath].add(n);
  }

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it (also note named bindings consumers want)
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) {
          deps.push({ spec, resolved });
          noteRequired(resolved, extractNamedBindings(prefix));
        }
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });

      // Shim 1: ensure a default export exists so 'import X from "./mod"' never fails.
      const hasDefault = /export\s+default\b/.test(code)
        || /export\s*\{[^}]*\bdefault\b[^}]*\}/.test(code)
        || /export\s*\{[^}]*\bas\s+default\b[^}]*\}/.test(code);
      if (!hasDefault) {
        code += "\n;export default {};\n";
      }

      // Shim 2: ensure every named binding requested by ANY consumer is a real
      // direct export. A local declaration or a re-export-star alone can still
      // fail during browser module linking with "Importing binding name ... not found".
      const required = requiredExports[path];
      if (required && required.size) {
        const additions = [];
        for (const name of required) {
          const reAnyDecl = new RegExp(
            "(?:^|[^\w$])(?:function\*?|class|const|let|var)\s+" + name + "\b"
          );
          const reNamedExport = new RegExp(
            "export\s+(?:async\s+)?(?:function\*?|class|const|let|var)\s+" + name + "\b"
            + "|export\s*\{[^}]*\b" + name + "\b[^}]*\}"
            + "|\bas\s+" + name + "\b"
          );
          if (reNamedExport.test(code)) continue;
          if (reAnyDecl.test(code)) additions.push("export { " + name + " };");
          else {
            const uid = "__webly_missing_" + name + "_" + Math.random().toString(36).slice(2, 8);
            additions.push("const " + uid + " = undefined; export { " + uid + " as " + name + " };");
          }
        }
        if (additions.length) {
          code += "\n;" + additions.join('\n') + "\n";
          console.warn('[Webly] Backfilled direct exports', additions.length, 'in', path);
        }
      }
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  // Pre-pass: scan every file's raw source so that requiredExports is fully
  // populated BEFORE any module is transformed/cached. Without this, a module
  // loaded earlier than one of its consumers wouldn't get the backfill.
  function prescanRequiredExports() {
    for (const filePath of Object.keys(FILES)) {
      if (!/\.(jsx?|tsx?)$/.test(filePath)) continue;
      const code = FILES[filePath];
      const re = new RegExp(IMPORT_RE.source, 'g');
      let m;
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(filePath, spec);
        if (resolved) noteRequired(resolved, extractNamedBindings(prefix));
      }
    }
  }

  (async () => {
    try {
      prescanRequiredExports();
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
