  const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;
    }
    return null;
  }

  function resolvePath(from, spec) {
    // External (bare) — handled via importmap
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    const base = from.replace(/[^/]+$/, '');
    const raw = spec.startsWith('/') ? spec : (base + spec);
    const segs = [];
    for (const s of raw.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return tryResolve('/' + segs.join('/'));
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    return Babel.transform(code, {
      presets, plugins: [], filename: path, sourceType: 'module',
    }).code;
  }

  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) deps.push({ spec, resolved });
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  (async () => {
    try {
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
</html>
